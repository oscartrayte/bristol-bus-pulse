version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: bristol-bus-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-bristol_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bristol_password}
      POSTGRES_DB: ${DB_NAME:-bristol_bus_pulse}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bristol_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bristol-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bristol-bus-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-bristol_user}:${DB_PASSWORD:-bristol_password}@postgres:5432/${DB_NAME:-bristol_bus_pulse}
      BODS_API_KEY: ${BODS_API_KEY}
      GTFS_RT_FEED_URL: https://data.bus-data.dft.gov.uk/api/v1/gtfsrt
      NAPTAN_FEED_URL: https://naptan.app.dft.gov.uk/data-download
      OPERATOR_CODES: FBUS
      INGESTION_INTERVAL_SECONDS: 30
      SNAPSHOT_INTERVAL_SECONDS: 300
      LOG_LEVEL: INFO
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/__pycache__
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - bristol-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bristol-bus-frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_MAP_STYLE: dark
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - bristol-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  bristol-network:
    driver: bridge
